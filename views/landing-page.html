---
layout: base.liquid
title: Landing Page
---

<style>
    .site-password {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        text-align: center;
        margin: auto;
        height: 0;
        width: 340px;
        display: table;
        font-size: 1.25em;
    }

    .site-password input {
        border: 0;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        padding: 0 .45em;
        padding-top: .1em;
        background: none;
        font-family: inherit;
        letter-spacing: .01em;
    }

    input:focus {
        outline: 0;
    }

    .submit-wrapper {
        border: 1px solid black;
        border-radius: 8px;
        overflow: hidden;
        height: 2em;
        position: fixed;
        width: 100%;
        left: 50%;
        transform: translateX(-50%);
        max-width: 14em;
        bottom: 30vh;
    }

    .button-area {
        position: absolute;
        border-radius: 6px;
        background: black;
        width: 1.7em;
        height: 1.7em;
        right: .25rem;
        top: 50%;
        transform: translateY(-50%);
    }

    .button-area button {
        display: none;
    }

    .mkvc--logo {
        aspect-ratio: 5.741/1;
        width: 80vw;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translateX(-50%) translateY(-90%);
    }

    @media (min-width: 800px) {
        .mkvc--logo {
            width: 40vw;
        }

        .site-password {
            font-size: 1.45em;

        }
    }
</style>

<div class="landing"></div>

<div class="site-password">
    <form class="submit-wrapper">
        <input name="pw" type="password" placeholder="Enter password..." autofocus="">
        <div class="button-area">
            <button type="submit" class="submit-button"></button>
        </div>
    </form>
</div>
